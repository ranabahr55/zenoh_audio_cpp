# =============================================================================
#  audio_zenoh_cpp — shared configuration for the publisher and subscriber.
#
#  Format: one `key = value` per line. Everything after a '#' is a comment.
#  The C++ publisher reads this file; the Python subscriber reads it too
#  (it defaults to ../audio_pub/config.cfg) so both ends always agree on the
#  Zenoh key, sample rate, channels and frame size.
# =============================================================================

# ---- Zenoh transport --------------------------------------------------------
# mode:    peer  -> fully distributed, discovers others by multicast scouting.
#                   Works out-of-the-box for pub+sub on the SAME machine.
#          client-> connects to a zenoh router (zenohd) given in `connect`.
mode     = peer

# connect: semicolon-separated endpoints to actively connect to.
#          Leave EMPTY for same-host peer mode (multicast discovery).
#          Example for a remote router:  tcp/192.168.1.50:7447
#          Example direct peer-to-peer:  tcp/192.168.1.50:7447
connect  =

# listen:  semicolon-separated endpoints this process listens on (optional).
#          Set this on ONE side for direct peer links across machines, e.g.
#          on the publisher:  tcp/0.0.0.0:7447   and point the subscriber's
#          `connect` at it.
listen   =

# ---- Tailscale streaming ----------------------------------------------------
# tailscale: 0 -> stream over the regular local Wi-Fi/LAN (multicast peer
#                 discovery, using the `mode`/`connect`/`listen` settings above).
#            1 -> stream over the Tailscale tailnet instead. The publisher
#                 auto-detects THIS device's Tailscale IP (the tailscale0 /
#                 100.64.0.0/10 address), listens on it, and prints the endpoint.
#                 The subscriber auto-discovers the publisher's Tailscale IP from
#                 the local tailscaled (or uses `tailscale_peer` below) and
#                 connects to it. Multicast scouting is disabled (Tailscale has
#                 no multicast); the link is a direct TCP peer connection.
tailscale      = 1

# tailscale_port: TCP port used for the Tailscale peer link (both ends).
tailscale_port = 7447

# tailscale_peer: (subscriber only, optional) the publisher's Tailscale IP or
#                 MagicDNS name to connect to. Leave EMPTY to auto-discover it
#                 from the local `tailscale status`. Semicolon-separated if you
#                 want to list several candidates.
tailscale_peer =

# key:     Zenoh key expression the stream is published on / subscribed to.
key      = audio/stream/mic1

# ---- Audio capture (must match on both ends) --------------------------------
sample_rate = 48000   # Hz. 48000 is the Opus-native rate; keep it unless needed.
channels    = 1       # 1 = mono, 2 = stereo.
frame_ms    = 20      # Opus frame size in ms: 2.5, 5, 10, 20, 40 or 60.
                      # Lower = lower latency, slightly more overhead.
                      # 20 ms is the sweet spot for real-time voice.

# ---- Opus encoder (quality vs. bandwidth) -----------------------------------
bitrate     = 64000   # bits/second. Voice: 24k-64k. Music: 96k-160k.
complexity  = 10      # 0-10. 10 = best quality, still real-time on a CPU.
vbr         = true    # variable bitrate (better quality per bit).
fec         = true    # in-band forward error correction (survives packet loss).
dtx         = false   # discontinuous transmission (stops sending during silence).
packet_loss_perc = 10 # expected loss %, tunes how aggressively FEC protects.
signal      = voice   # voice | music — biases the encoder's model.
low_delay   = false   # true = OPUS_APPLICATION_RESTRICTED_LOWDELAY (min latency,
                      # disables FEC/voice model). Leave false for best quality.

# ---- Subscriber output ------------------------------------------------------
output           = capture.flac  # file the subscriber writes the decoded audio to.
flac_compression = 5             # 0-8 FLAC compression level (higher = smaller).
